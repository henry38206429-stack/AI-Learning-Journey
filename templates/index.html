<!DOCTYPE html>
<html>
<head>
    <title>AI 手寫辨識</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f8;
            text-align: center;
            padding-top: 30px;
        }

        .card {
            background: white;
            width: 400px;
            margin: auto;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        canvas {
            border: 2px solid #333;
            border-radius: 10px;
            background: white;
        }

        button {
            margin-top: 10px;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .predict-btn {
            background: #4CAF50;
            color: white;
        }

        .clear-btn {
            background: #f44336;
            color: white;
        }

        .result {
            margin-top: 15px;
            font-size: 24px;
            font-weight: bold;
        }

        .loading {
            display: none;
            color: #888;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>✍️ AI 手寫辨識</h2>

    <canvas id="canvas" width="280" height="280"></canvas>

    <br>

    <button class="predict-btn" onclick="predict()">預測</button>
    <button class="clear-btn" onclick="clearCanvas()">清除</button>

    <div class="loading" id="loading">AI 思考中...</div>

    <div class="result" id="result">結果：-</div>
</div>

<script>
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");

let drawing = false;

// 畫筆
canvas.addEventListener("mousedown", () => drawing = true);
canvas.addEventListener("mouseup", () => drawing = false);
canvas.addEventListener("mousemove", draw);

function draw(e) {
    if (!drawing) return;

    ctx.fillStyle = "black";
    ctx.beginPath();
    ctx.arc(e.offsetX, e.offsetY, 8, 0, Math.PI * 2);
    ctx.fill();
}

// 清除
function clearCanvas() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    document.getElementById("result").innerText = "結果：-";
}

// 預測
async function predict() {

    document.getElementById("loading").style.display = "block";

    let data = canvas.toDataURL();

    let res = await fetch("/predict", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ image: data })
    });

    let result = await res.json();

    document.getElementById("loading").style.display = "none";

    if (result.prediction !== undefined) {
        document.getElementById("result").innerText =
            "結果：" + result.prediction;
    } else {
        document.getElementById("result").innerText =
            "錯誤";
    }
}
</script>

</body>
</html>
