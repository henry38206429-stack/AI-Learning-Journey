<!DOCTYPE html>

<html>

<body>

<h1>AI 手寫辨識</h1>

<canvas
id="canvas"
width="280"
height="280"
style="border:1px solid black">
</canvas>

<br><br>

<button onclick="predict()">
預測
</button>

<button onclick="clearCanvas()">
清除
</button>

<h2 id="result">
AI：
</h2>

<script>

const canvas=
document.getElementById("canvas")

const ctx=
canvas.getContext("2d")

ctx.fillStyle="white"
ctx.fillRect(
0,
0,
canvas.width,
canvas.height
)

let drawing=false

canvas.addEventListener(
"mousedown",
()=>drawing=true
)

canvas.addEventListener(
"mouseup",
()=>drawing=false
)

canvas.addEventListener(
"mousemove",
draw
)

function draw(e){

if(!drawing)return

ctx.fillStyle="black"

ctx.beginPath()

ctx.arc(
e.offsetX,
e.offsetY,
10,
0,
Math.PI*2
)

ctx.fill()

}

function clearCanvas(){

ctx.fillStyle="white"

ctx.fillRect(
0,
0,
canvas.width,
canvas.height
)

document.getElementById(
"result"
).innerHTML="AI："

}

async function predict(){

const image=
canvas.toDataURL()

const response=
await fetch(
"/predict",
{
method:"POST",

headers:{
"Content-Type":
"application/json"
},

body:JSON.stringify({
image:image
})
}
)

const data=
await response.json()

document.getElementById(
"result"
).innerHTML=
"AI："+data.prediction

}

</script>

</body>

</html>
